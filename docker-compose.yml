version: "3.9"

services:
  backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
      ports:
        - "5000:5000"
      volumes:
        - ./backend:/app
      environment:
        - FLASK_ENV=development
        - DB_HOST=db
        - DB_USER=user
        - DB_PASSWORD=1234
        - DB_NAME=MGT_db
      depends_on:
        - db

  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      ports:
        - "5173:5173"
      volumes:
        - ./frontend:/app
        - /app/node_modules

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: MGT_db
      MYSQL_USER: user
      MYSQL_PASSWORD: 1234
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./table.sql:/docker-entrypoint-initdb.d/table.sql



volumes:
  mysql_data: